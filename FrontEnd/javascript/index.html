<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Switch Statement</title>
</head>
<body>
    <script>
            let day=3;
            switch(day){
                case 1:
                    console.log("Monday");
                    
                case 2:
                    console.log("Tuesday");
                    
                case 3:
                    console.log("Wednesday");
                    
                case 4:
                    console.log("Thursday");
                    
                case 5:
                    console.log("Friday");
                    break;
                    
                case 6:
                    console.log("Saturday");
                    
                case 7:
                    console.log("Sunday");
                    
            }

    </script>
</body>
</html>
